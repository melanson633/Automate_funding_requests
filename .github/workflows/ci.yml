name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install \
            pre-commit==3.7.0 \
            ruff==0.4.2 \
            flake8==7.0.0 \
            pytest==8.2.2 \
            pytest-cov==4.1.0 \
            trufflehog==2.2.1

      - name: Run pre-commit
        run: pre-commit run --all-files

      - name: Ruff lint
        run: ruff check .

      - name: Flake8 lint
        run: flake8 .

      - name: Run tests
        run: pytest --cov=cre_advance --cov-report=xml

      - name: Secret scan
        run: trufflehog --entropy --regex --json .
