lender: "yardi_expense_distribution"
logging:
  level: INFO

filter_funded: true

excel:
  sheet_name: "Expense Distribution Report"
  header_row: 3
  # Use AI-generated schema
  fields:
    - property_name
    - job_name
    - vendor_name
    - category_description
    - amount
    - invoice_number
    - invoice_date
    - control_number
    - accounting_period_date
    - expense_account_number
    - retention_amount
    - remarks
  mapping:
    Amount: amount
    Category: category_description
    Company (Vendor Code): vendor_name
    Control: control_number
    Expense Account: expense_account_number
    'Invoice #': invoice_number
    Invoice Date: invoice_date
    Job: job_name
    Period: accounting_period_date
    Property: property_name
    Remarks: remarks
    Retention Amount: retention_amount

template:
  sheet_name: "INVOICES"
  header_row: 6
  # Template column mapping (template column -> normalized column)
  column_mapping:
    "Vendor": "vendor_name"
    "Invoice #": "invoice_number"