logging:
  level: INFO
  file: logs/cre_advance.log
mapping_coverage_threshold: 0.6
unmatched_threshold: 0.4
min_confidence: 0.0
model_tier: pro
gemini_temperature: 0.1
gemini_max_retries: 3
concurrency_limit: 5
batch_size: 20
auto_save_schemas: true
report_types:
  general_ledger:
    sheet_name: "Report1"
    header_row: 6
    expected_columns: []
  expense_distribution:
    sheet_name: "Expense Distribution Report"
    header_row: 3
    expected_columns: []
  funding_template:
    sheet_name: "DRIVER"
    header_row: 4
prompts:
  system_instruction: configs/prompts/system_instruction.txt
  classify_pages: configs/prompts/classify_pages_prompt.yaml
  segment_pdf: configs/prompts/segment_pdf_prompt.yaml
scoring:
  classification_weight: 1.0
packager:
  vendor_ratio_threshold: 0.8
  amount_tolerance: 0.01
  score_threshold: 2.0
pdf:
  remove_invoice_register: true
  classification_confidence_threshold: 0.5
  use_vision: false  # toggles the Gemini Vision path
  vision_model: "gemini-2.5-pro"  # allows overriding the model name
  max_pages_per_request: 3000  # number of pages batched per request
ocr:
  langs: eng
  psm: 6
  oem: 1
  deskew: false
